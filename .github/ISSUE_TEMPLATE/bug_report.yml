name: Bug Report
description: Report a bug in RynBridge
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (TypeScript)
        - iOS (Swift)
        - Android (Kotlin)
        - Multiple
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: RynBridge Version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Module
      placeholder: e.g. core, device, storage

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        OS: iOS 17.0 / Android 14 / Chrome 120
        Device: iPhone 15 / Pixel 8
        WebView: WKWebView / Android WebView
