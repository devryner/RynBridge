name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - name: Bundle Size Check
        run: pnpm check:size
      - name: API Consistency Check
        run: pnpm check:api

  ios:
    name: iOS SDK
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  android:
    name: Android SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x :auth-google:build -x :auth-kakao:build -x :push-fcm:build -x :payment-google-play:build

      - name: Test
        run: ./gradlew test -x :auth-google:test -x :auth-kakao:test -x :push-fcm:test -x :payment-google-play:test
