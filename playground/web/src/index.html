<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>RynBridge Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #333;
      padding: 12px;
      padding-bottom: env(safe-area-inset-bottom, 12px);
    }
    h1 { font-size: 18px; margin-bottom: 12px; text-align: center; }
    h2 {
      font-size: 14px;
      color: #666;
      margin: 12px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #ddd;
    }

    .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
    button {
      padding: 8px 12px;
      border: 1px solid #007aff;
      border-radius: 6px;
      background: #fff;
      color: #007aff;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:active { background: #007aff; color: #fff; }

    .input-row { display: flex; gap: 6px; margin-bottom: 6px; }
    input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }

    .panel {
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 8px;
      padding: 10px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #result-panel { min-height: 60px; max-height: 120px; margin-bottom: 8px; }
    #log-panel { min-height: 100px; max-height: 200px; }

    .log-entry { margin-bottom: 2px; }
    .log-info { color: #9cdcfe; }
    .log-success { color: #6a9955; }
    .log-error { color: #f44747; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .panel-header span { font-size: 12px; font-weight: 600; color: #999; }
    #btn-clear-log {
      padding: 4px 8px;
      font-size: 11px;
      border-color: #999;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>RynBridge Playground</h1>

  <!-- Device -->
  <h2>Device</h2>
  <div class="btn-row">
    <button id="btn-device-getInfo">getInfo</button>
    <button id="btn-device-getBattery">getBattery</button>
    <button id="btn-device-getScreen">getScreen</button>
    <button id="btn-device-vibrate">vibrate</button>
  </div>

  <!-- Storage -->
  <h2>Storage</h2>
  <div class="input-row">
    <input id="storage-key" placeholder="key" value="testKey" />
    <input id="storage-value" placeholder="value" value="hello" />
  </div>
  <div class="btn-row">
    <button id="btn-storage-set">set</button>
    <button id="btn-storage-get">get</button>
    <button id="btn-storage-remove">remove</button>
    <button id="btn-storage-keys">keys</button>
    <button id="btn-storage-clear">clear</button>
  </div>

  <!-- Secure Storage -->
  <h2>Secure Storage</h2>
  <div class="input-row">
    <input id="secure-key" placeholder="key" value="secretKey" />
    <input id="secure-value" placeholder="value" value="secret123" />
  </div>
  <div class="btn-row">
    <button id="btn-secure-set">set</button>
    <button id="btn-secure-get">get</button>
    <button id="btn-secure-remove">remove</button>
    <button id="btn-secure-has">has</button>
  </div>

  <!-- UI -->
  <h2>UI</h2>
  <div class="btn-row">
    <button id="btn-ui-showAlert">showAlert</button>
    <button id="btn-ui-showConfirm">showConfirm</button>
    <button id="btn-ui-showToast">showToast</button>
    <button id="btn-ui-showActionSheet">showActionSheet</button>
  </div>

  <!-- Auth -->
  <h2>Auth</h2>
  <div class="input-row">
    <input id="auth-provider" placeholder="provider" value="google" />
  </div>
  <div class="btn-row">
    <button id="btn-auth-login">login</button>
    <button id="btn-auth-getToken">getToken</button>
    <button id="btn-auth-getUser">getUser</button>
    <button id="btn-auth-logout">logout</button>
  </div>

  <!-- Push -->
  <h2>Push</h2>
  <div class="btn-row">
    <button id="btn-push-requestPermission">requestPermission</button>
    <button id="btn-push-register">register</button>
    <button id="btn-push-getToken">getToken</button>
    <button id="btn-push-getPermissionStatus">getPermissionStatus</button>
    <button id="btn-push-unregister">unregister</button>
  </div>

  <!-- Payment -->
  <h2>Payment</h2>
  <div class="input-row">
    <input id="payment-productId" placeholder="productId" value="premium_monthly" />
  </div>
  <div class="btn-row">
    <button id="btn-payment-getProducts">getProducts</button>
    <button id="btn-payment-purchase">purchase</button>
    <button id="btn-payment-restore">restorePurchases</button>
  </div>

  <!-- Media -->
  <h2>Media</h2>
  <div class="input-row">
    <input id="media-source" placeholder="audio source URL" value="https://example.com/sample.mp3" />
  </div>
  <div class="btn-row">
    <button id="btn-media-playAudio">playAudio</button>
    <button id="btn-media-pickMedia">pickMedia</button>
    <button id="btn-media-startRecording">startRecording</button>
  </div>

  <!-- Crypto -->
  <h2>Crypto</h2>
  <div class="input-row">
    <input id="crypto-data" placeholder="data to encrypt" value="Hello, RynBridge!" />
  </div>
  <div class="btn-row">
    <button id="btn-crypto-generateKeyPair">generateKeyPair</button>
    <button id="btn-crypto-encrypt">encrypt</button>
    <button id="btn-crypto-getStatus">getStatus</button>
    <button id="btn-crypto-rotateKeys">rotateKeys</button>
  </div>

  <!-- Result Panel -->
  <h2>Result</h2>
  <div id="result-panel" class="panel"></div>

  <!-- Log Panel -->
  <div class="panel-header">
    <span>Log</span>
    <button id="btn-clear-log">Clear</button>
  </div>
  <div id="log-panel" class="panel"></div>

  <script src="playground.js"></script>
</body>
</html>
